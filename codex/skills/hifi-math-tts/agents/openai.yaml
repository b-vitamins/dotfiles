interface:
  display_name: "HiFi Math TTS"
  short_description: "High-fidelity technical TTS script generation"
  default_prompt: "Use $hifi-math-tts to turn the LaTeX source in this workspace into TTS-ready spoken scripts. If the workspace contains multiple canonical sources, treat it as a whole-book run: discover front matter, chapters, appendices, answers or solutions, bibliography or references, and index first, use plans/<source-stem>/ only as transient validation state, write final spoken scripts under scripts/<source-stem>/, aggregate final status before cleanup, then remove transient plans and worker logs so only the scripts remain. Build a deterministic section plan, checkpoint ledger, notation lexicon, and lexicon audit for each source, expand the lexicon automatically from uncovered audit suggestions until the audit is clean or a real blocker remains, keep ordinary prose minimally changed unless speech demands otherwise, preserve decorated symbols and naming consistently, use explicit printed equation tags as equation identifiers, never narrate checkpoint metadata or source tags, render dotless i and j notation as i hat, j hat, vector i, or vector j instead of imath or jmath, speak grouped powers, compound denominators, factorial scopes, and evaluation-at notation with explicit audible grouping, handle notation tables and glossary-style appendices in an orderly spoken form, use native agent orchestration only for the actual spoken rewrite, and do not create or use ad-hoc generator scripts, pandoc converters, regex mass-rewrite helpers, shell-launched codex exec workers, or approval/sandbox bypass CLI sessions for the final transcript text. Spell out all numbers in the final script, validate that prose anchors, equations, captions, algorithms, exercises, and notation consistency were preserved, finish with an acceptance sample before claiming the scripts are ready for TTS, and clean transient artifacts before the final report."
