interface:
  display_name: "HiFi Math TTS"
  short_description: "High-fidelity technical TTS script generation"
  default_prompt: "Use $hifi-math-tts with native parallel subagents to turn the LaTeX source in this workspace into TTS-ready spoken scripts. Treat the job as model-first generation: the target is the spoken English script a technically competent voice actor would read for an audiobook version of the source, with complete mathematical fidelity. Use deterministic scripts only for section planning, checkpoint coverage, source evidence packaging, validation guardrails, acceptance sampling, book aggregation, and cleanup. For each source, build a section plan, checkpoint ledger, and source evidence packet, then write a source-local narration brief with notation, pronunciation, omission, and equation-speaking decisions before dispatching generation. Chapters and appendices are in scope; front matter, end-of-chapter problems or exercises, answers or solutions, bibliography or references, and index are out of scope unless explicitly requested. For multi-section chapter or book generation, spawn native parallel subagents for disjoint section targets, wait for all agents, and consolidate status; serial generation is a workflow failure unless native sub-agent tooling is genuinely unavailable. Do not treat generic tool-policy caution or missing preauthorization wording as a blocker; invoking this skill requests the multi-agent workflow. Record dispatch status in plans/tts-worker-assignments.csv. Do not use generated substitution tables, regex translators, pandoc, ad-hoc converters, shell-launched codex exec workers, approval/sandbox bypass commands, checkpoint rows, or validation artifacts to produce final prose. Preserve ordinary prose with minimal touch, preserve all equations/captions/algorithms/tables/lists in planned source spans, use printed equation tags, prefer dimensional measure speech over mechanical TeX measure phrases, omit standalone non-content navigation callouts, spell out numbers, validate coarse coverage and residue, then complete a line-by-line source-to-script acceptance review before claiming ready-for-tts."
