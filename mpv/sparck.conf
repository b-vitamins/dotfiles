# Intel laptop defaults for smooth playback and lower thermals.

# Audio
ao=pulse
audio-channels=stereo
audio-normalize-downmix=yes

# GPU/Video Output
vo=gpu-next
gpu-api=vulkan
hwdec=auto-safe
vulkan-async-transfer=yes
gpu-shader-cache-dir="~/.cache/mpv/shaders"
vd-lavc-dr=yes

# Prefer smooth playback over expensive interpolation on the iGPU.
video-sync=audio

# Scaling Filters
scale=ewa_lanczos
dscale=mitchell
cscale=bilinear

# HDR Tone Mapping
tone-mapping=bt.2446a
tone-mapping-param=1.0
hdr-compute-peak=no
target-prim=bt.709
target-trc=srgb
target-peak=200

# Debanding
deband=yes
deband-iterations=2
deband-threshold=24
deband-range=16
deband-grain=8

# Dithering
dither-depth=8
temporal-dither=yes
dither=fruit

# Cache
cache=yes
cache-secs=120
demuxer-max-bytes=2048MiB
demuxer-max-back-bytes=1024MiB
demuxer-readahead-secs=120
stream-buffer-size=4MiB

# Screenshots
screenshot-format=png
screenshot-png-compression=0
screenshot-high-bit-depth=yes
screenshot-directory="~/pictures/mpv"

# Subtitles
sub-auto=fuzzy
sub-font="Roboto"
sub-font-size=48
sub-border-size=2.5
sub-border-color="0.0/0.0/0.0/0.8"
sub-color="1.0/1.0/1.0/1.0"
sub-shadow-offset=2
sub-shadow-color="0.0/0.0/0.0/0.6"
sub-blur=0.3
sub-margin-y=50
sub-ass-override=force
blend-subtitles=video

# OSD
osc=yes
osd-font="Roboto"
osd-font-size=32
osd-color="#FFFFFF"
osd-border-color="#000000"
osd-border-size=1.2
osd-shadow-offset=0.5
osd-shadow-color="#000000B0"
osd-blur=0.3
osd-bold=no
osd-spacing=0.5

# Progress Bar
osd-bar-align-x=0
osd-bar-align-y=0.95
osd-bar-w=95
osd-bar-h=2.5
osd-duration=2000
osd-on-seek=msg-bar

# Window
title="${media-title:${filename/no-ext}} - mpv"
background=color
background-color=0.1/0.1/0.1
cursor-autohide=1000
cursor-autohide-fs-only=yes

# Profiles

[Quality-Plus]
video-sync=display-resample
interpolation
tscale=oversample
scale=ewa_lanczossharp
dscale=ewa_lanczossharp
cscale=ewa_lanczos
deband-iterations=4

[Balanced]
video-sync=audio
scale=ewa_lanczos
dscale=mitchell
cscale=bilinear
deband-iterations=2

[Performance]
scale=spline36
dscale=bilinear
cscale=bilinear
deband=no

# Misc
save-position-on-quit=yes
keep-open=yes
msg-level=all=warn
osd-duration=2000
